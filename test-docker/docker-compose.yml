version: '3.8'

services:
  test-claude:
    build: .
    container_name: test-claude-code
    volumes:
      # 挂载当前目录到容器
      - .:/workspace
      # 挂载 git 配置（注意路径对应非 root 用户）
      - ~/.gitconfig:/home/coder/.gitconfig:ro
    working_dir: /workspace
    env_file:
      # 加载环境变量
      - .env
    stdin_open: true
    tty: true
    # 保持容器运行
    command: tail -f /dev/null
