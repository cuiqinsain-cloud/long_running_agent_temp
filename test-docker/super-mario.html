<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级玛丽 Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #5c94fc, #5c94fc 80%, #000 80%);
            font-family: Arial, sans-serif;
        }

        #gameContainer {
            text-align: center;
        }

        canvas {
            border: 4px solid #000;
            background: #5c94fc;
            display: block;
            margin: 0 auto;
        }

        #info {
            color: white;
            margin-top: 20px;
            font-size: 18px;
        }

        .controls {
            color: white;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="info">
            <div>得分: <span id="score">0</span> | 生命: <span id="lives">3</span></div>
        </div>
        <div class="controls">
            <p>操作: ← → 移动 | 空格键 跳跃 | R 重新开始</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏状态
        let score = 0;
        let lives = 3;
        let gameOver = false;

        // 玩家对象
        const player = {
            x: 100,
            y: 400,
            width: 32,
            height: 32,
            velocityX: 0,
            velocityY: 0,
            speed: 5,
            jumpPower: 12,
            onGround: false,
            direction: 1 // 1: 右, -1: 左
        };

        // 重力
        const gravity = 0.5;
        const maxFallSpeed = 15;

        // 键盘输入
        const keys = {};

        // 平台
        const platforms = [
            { x: 0, y: 550, width: 800, height: 50 }, // 地面
            { x: 200, y: 450, width: 150, height: 20 },
            { x: 400, y: 350, width: 150, height: 20 },
            { x: 100, y: 250, width: 100, height: 20 },
            { x: 600, y: 450, width: 150, height: 20 },
            { x: 650, y: 300, width: 100, height: 20 }
        ];

        // 砖块
        const bricks = [
            { x: 250, y: 300, width: 40, height: 40, hit: false },
            { x: 300, y: 300, width: 40, height: 40, hit: false },
            { x: 450, y: 200, width: 40, height: 40, hit: false },
            { x: 500, y: 200, width: 40, height: 40, hit: false }
        ];

        // 敌人
        const enemies = [
            { x: 300, y: 430, width: 30, height: 30, velocityX: 2, active: true },
            { x: 500, y: 330, width: 30, height: 30, velocityX: -2, active: true },
            { x: 650, y: 280, width: 30, height: 30, velocityX: 1.5, active: true }
        ];

        // 金币
        const coins = [
            { x: 275, y: 420, width: 20, height: 20, collected: false },
            { x: 475, y: 320, width: 20, height: 20, collected: false },
            { x: 125, y: 220, width: 20, height: 20, collected: false },
            { x: 675, y: 270, width: 20, height: 20, collected: false }
        ];

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'KeyR' && gameOver) {
                resetGame();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // 碰撞检测
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // 更新玩家
        function updatePlayer() {
            if (gameOver) return;

            // 左右移动
            if (keys['ArrowLeft']) {
                player.velocityX = -player.speed;
                player.direction = -1;
            } else if (keys['ArrowRight']) {
                player.velocityX = player.speed;
                player.direction = 1;
            } else {
                player.velocityX = 0;
            }

            // 跳跃
            if (keys['Space'] && player.onGround) {
                player.velocityY = -player.jumpPower;
                player.onGround = false;
            }

            // 应用重力
            player.velocityY += gravity;
            if (player.velocityY > maxFallSpeed) {
                player.velocityY = maxFallSpeed;
            }

            // 更新位置
            player.x += player.velocityX;
            player.y += player.velocityY;

            // 边界检测
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) {
                player.x = canvas.width - player.width;
            }

            // 平台碰撞
            player.onGround = false;
            platforms.forEach(platform => {
                if (checkCollision(player, platform)) {
                    if (player.velocityY > 0) {
                        player.y = platform.y - player.height;
                        player.velocityY = 0;
                        player.onGround = true;
                    }
                }
            });

            // 砖块碰撞
            bricks.forEach(brick => {
                if (!brick.hit && checkCollision(player, brick)) {
                    if (player.velocityY < 0 && player.y < brick.y) {
                        brick.hit = true;
                        score += 10;
                        player.velocityY = 2;
                    } else if (player.velocityY > 0) {
                        player.y = brick.y + brick.height;
                        player.velocityY = 0;
                    }
                }
            });

            // 金币收集
            coins.forEach(coin => {
                if (!coin.collected && checkCollision(player, coin)) {
                    coin.collected = true;
                    score += 50;
                }
            });

            // 敌人碰撞
            enemies.forEach(enemy => {
                if (enemy.active && checkCollision(player, enemy)) {
                    if (player.velocityY > 0 && player.y < enemy.y + enemy.height / 2) {
                        enemy.active = false;
                        score += 100;
                        player.velocityY = -8;
                    } else {
                        lives--;
                        if (lives <= 0) {
                            gameOver = true;
                        } else {
                            player.x = 100;
                            player.y = 400;
                            player.velocityX = 0;
                            player.velocityY = 0;
                        }
                    }
                }
            });

            // 掉落死亡
            if (player.y > canvas.height) {
                lives--;
                if (lives <= 0) {
                    gameOver = true;
                } else {
                    player.x = 100;
                    player.y = 400;
                    player.velocityX = 0;
                    player.velocityY = 0;
                }
            }
        }

        // 更新敌人
        function updateEnemies() {
            enemies.forEach(enemy => {
                if (!enemy.active) return;

                enemy.x += enemy.velocityX;

                // 平台边缘转向
                let onPlatform = false;
                platforms.forEach(platform => {
                    if (enemy.y + enemy.height >= platform.y &&
                        enemy.y + enemy.height <= platform.y + 10 &&
                        enemy.x + enemy.width > platform.x &&
                        enemy.x < platform.x + platform.width) {
                        onPlatform = true;
                        if (enemy.x <= platform.x || enemy.x + enemy.width >= platform.x + platform.width) {
                            enemy.velocityX *= -1;
                        }
                    }
                });
            });
        }

        // 绘制玩家
        function drawPlayer() {
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // 眼睛
            ctx.fillStyle = '#ffffff';
            const eyeOffset = player.direction > 0 ? 20 : 8;
            ctx.fillRect(player.x + eyeOffset, player.y + 8, 6, 6);

            // 帽子
            ctx.fillStyle = '#cc0000';
            ctx.fillRect(player.x + 4, player.y, player.width - 8, 8);
        }

        // 绘制平台
        function drawPlatforms() {
            ctx.fillStyle = '#8b4513';
            platforms.forEach(platform => {
                ctx.fillRect(platform.x, platform.y, platform.width, platform.height);

                // 草地纹理
                if (platform.y < 550) {
                    ctx.fillStyle = '#00ff00';
                    for (let i = 0; i < platform.width; i += 20) {
                        ctx.fillRect(platform.x + i, platform.y, 10, 5);
                    }
                    ctx.fillStyle = '#8b4513';
                }
            });
        }

        // 绘制砖块
        function drawBricks() {
            bricks.forEach(brick => {
                if (brick.hit) return;

                ctx.fillStyle = '#ff8800';
                ctx.fillRect(brick.x, brick.y, brick.width, brick.height);

                // 砖块纹理
                ctx.strokeStyle = '#cc6600';
                ctx.lineWidth = 2;
                ctx.strokeRect(brick.x, brick.y, brick.width, brick.height);
                ctx.beginPath();
                ctx.moveTo(brick.x + brick.width / 2, brick.y);
                ctx.lineTo(brick.x + brick.width / 2, brick.y + brick.height);
                ctx.stroke();
            });
        }

        // 绘制敌人
        function drawEnemies() {
            enemies.forEach(enemy => {
                if (!enemy.active) return;

                ctx.fillStyle = '#8b0000';
                ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);

                // 眼睛
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(enemy.x + 6, enemy.y + 8, 6, 6);
                ctx.fillRect(enemy.x + 18, enemy.y + 8, 6, 6);

                ctx.fillStyle = '#000000';
                ctx.fillRect(enemy.x + 8, enemy.y + 10, 3, 3);
                ctx.fillRect(enemy.x + 20, enemy.y + 10, 3, 3);
            });
        }

        // 绘制金币
        function drawCoins() {
            coins.forEach(coin => {
                if (coin.collected) return;

                ctx.fillStyle = '#ffff00';
                ctx.beginPath();
                ctx.arc(coin.x + coin.width / 2, coin.y + coin.height / 2, coin.width / 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#ffaa00';
                ctx.beginPath();
                ctx.arc(coin.x + coin.width / 2, coin.y + coin.height / 2, coin.width / 3, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // 绘制云朵
        function drawClouds() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';

            const clouds = [
                { x: 100, y: 80 },
                { x: 400, y: 120 },
                { x: 650, y: 60 }
            ];

            clouds.forEach(cloud => {
                ctx.beginPath();
                ctx.arc(cloud.x, cloud.y, 30, 0, Math.PI * 2);
                ctx.arc(cloud.x + 25, cloud.y, 35, 0, Math.PI * 2);
                ctx.arc(cloud.x + 50, cloud.y, 30, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // 绘制游戏
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawClouds();
            drawPlatforms();
            drawBricks();
            drawCoins();
            drawEnemies();
            drawPlayer();

            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#ffffff';
                ctx.font = '48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('游戏结束!', canvas.width / 2, canvas.height / 2 - 40);

                ctx.font = '24px Arial';
                ctx.fillText('最终得分: ' + score, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillText('按 R 键重新开始', canvas.width / 2, canvas.height / 2 + 60);
            }
        }

        // 更新UI
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
        }

        // 重置游戏
        function resetGame() {
            score = 0;
            lives = 3;
            gameOver = false;

            player.x = 100;
            player.y = 400;
            player.velocityX = 0;
            player.velocityY = 0;
            player.onGround = false;

            bricks.forEach(brick => brick.hit = false);
            coins.forEach(coin => coin.collected = false);
            enemies.forEach((enemy, i) => {
                enemy.active = true;
                enemy.x = [300, 500, 650][i];
                enemy.velocityX = [2, -2, 1.5][i];
            });
        }

        // 游戏循环
        function gameLoop() {
            updatePlayer();
            updateEnemies();
            draw();
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        // 启动游戏
        gameLoop();
    </script>
</body>
</html>
